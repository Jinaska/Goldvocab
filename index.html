  .header {

  }
  .header h1 { font-size: 1.5rem; color: #f59e0b; letter-spacing: 2px; }
  .header .subtitle { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
  .container { width: 100%; max-width: 520px; padding: 20px; flex: 1; }
  .stats {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; font-size: 0.85rem; color: #94a3b8;
  }
  .stats .score { color: #34d399; font-weight: 600; }
  .stats .wrong { color: #f87171; font-weight: 600; }
  .progress-wrap {
    width: 100%; height: 6px; background: #1e293b;
    border-radius: 3px; margin-bottom: 24px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24);
    border-radius: 3px; transition: width 0.4s ease;
  }
  .card {
    background: #1e293b; border-radius: 16px; padding: 32px 24px;
    text-align: center; margin-bottom: 20px;
    border: 1px solid #334155; box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .card .label {
    font-size: 0.75rem; color: #64748b;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
  }
  .card .word { font-size: 2rem; font-weight: 700; color: #f8fafc; letter-spacing: 1px; }
  .choices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .choice-btn {
    width: 100%; padding: 16px 20px; font-size: 1rem;
    border: 2px solid #334155; border-radius: 12px;
    background: #1e293b; color: #e2e8f0; cursor: pointer;
    transition: all 0.2s ease; text-align: left;
  }
  .choice-btn:hover:not(.disabled) { border-color: #f59e0b; background: #263044; }
  .choice-btn.correct { border-color: #34d399; background: #064e3b; color: #34d399; }
  .choice-btn.incorrect { border-color: #f87171; background: #450a0a; color: #f87171; }
  .choice-btn.disabled { cursor: default; opacity: 0.6; }
  .choice-btn.disabled.correct { opacity: 1; }
  .feedback {
    text-align: center; min-height: 48px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; margin-bottom: 16px;
  }
  .feedback .msg { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
  .feedback .msg.ok { color: #34d399; }
  .feedback .msg.ng { color: #f87171; }
  .feedback .answer-info { font-size: 0.85rem; color: #94a3b8; }
  .next-btn {
    width: 100%; padding: 14px; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #0f172a; cursor: pointer; display: none; transition: transform 0.15s;
  }
  .next-btn:hover { transform: scale(1.02); }
  .next-btn:active { transform: scale(0.98); }
  .result { text-align: center; padding: 40px 20px; }
  .result h2 { font-size: 1.6rem; color: #f59e0b; margin-bottom: 12px; }
  .result .big-score { font-size: 3.5rem; font-weight: 800; color: #f8fafc; margin: 16px 0; }
  .result .big-score span { font-size: 1.5rem; color: #94a3b8; }
  .result .detail { font-size: 0.9rem; color: #94a3b8; margin-bottom: 24px; line-height: 1.8; }
  .action-btn {
    padding: 14px 32px; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 12px; cursor: pointer; margin: 6px; transition: transform 0.15s;
  }
  .action-btn:hover { transform: scale(1.02); }
  .action-btn:active { transform: scale(0.98); }
  .action-btn.primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; }
  .action-btn.secondary { background: #334155; color: #e2e8f0; border: 2px solid #475569; }
  .action-btn.review { background: linear-gradient(135deg, #f87171, #dc2626); color: #fff; }
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .mode-tab {
    flex: 1; padding: 10px 6px; font-size: 0.85rem; font-weight: 600;
    border: 2px solid #334155; border-radius: 10px;
    background: #1e293b; color: #94a3b8; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .mode-tab.active { border-color: #f59e0b; color: #f59e0b; background: #292524; }
  .mode-tab .count { display: block; font-size: 1.1rem; margin-top: 2px; }
  .range-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
  .range-btn {
    padding: 14px 8px; font-size: 0.9rem; font-weight: 600;
    border: 2px solid #334155; border-radius: 10px;
    background: #1e293b; color: #e2e8f0; cursor: pointer;

    width: 100%; padding: 12px; font-size: 0.85rem; font-weight: 600;

</head>

let mode = 'all';
let quizWords = [];
let currentIndex = 0;
let score = 0;
let wrongCount = 0;
let wrongWords = [];
let answered = false;

function getReviewWords() {
  try { const d = sessionStorage.getItem('kinpure_review'); return d ? JSON.parse(d) : []; }
  catch { return []; }
}
function saveReviewWords(words) {
  try { sessionStorage.setItem('kinpure_review', JSON.stringify(words)); } catch {}
}
let reviewBank = getReviewWords();

function switchTab(tab) {
  document.getElementById('tabAll').classList.toggle('active', tab === 'all');
  document.getElementById('tabRange').classList.toggle('active', tab === 'range');
  document.getElementById('tabReview').classList.toggle('active', tab === 'review');
  document.getElementById('panelAll').classList.toggle('hidden', tab !== 'all');
  document.getElementById('panelRange').classList.toggle('hidden', tab !== 'range');
  document.getElementById('panelReview').classList.toggle('hidden', tab !== 'review');
  updateReviewPanel();
}

function updateReviewPanel() {
  const count = reviewBank.length;
  document.getElementById('countReview').textContent = count;
  if (count === 0) {
    document.getElementById('reviewMsg').textContent = '復習する単語がありません。まず学習しましょう！';
    document.getElementById('reviewStartBtn').disabled = true;
  } else {
    document.getElementById('reviewMsg').textContent = `間違えた${count}語を復習します。`;
    document.getElementById('reviewStartBtn').disabled = false;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function launchQuiz(words) {
  quizWords = shuffle(words);
  currentIndex = 0; score = 0; wrongCount = 0; wrongWords = []; answered = false;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('qTotal').textContent = quizWords.length;
  showQuestion();
}

function startAll() { mode = 'all'; launchQuiz([...ALL_WORDS]); }
function startRange(from, to) { mode = 'range'; launchQuiz(ALL_WORDS.slice(from, to)); }
function startReviewMode() {
  mode = 'review';
  const words = reviewBank.map(en => ALL_WORDS.find(w => w.en === en)).filter(Boolean);
  if (words.length === 0) return;
  launchQuiz(words);
}

function showQuestion() {
  answered = false;
  const q = quizWords[currentIndex];
  document.getElementById('qNum').textContent = currentIndex + 1;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('wrongNum').textContent = wrongCount;
  document.getElementById('progressBar').style.width = ((currentIndex) / quizWords.length * 100) + '%';
  document.getElementById('questionWord').textContent = q.en;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';

  const wrongOptions = ALL_WORDS.filter(w => w.ja !== q.ja);
  const shuffledWrong = shuffle(wrongOptions).slice(0, 3);
  const options = shuffle([q, ...shuffledWrong]);

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.ja;
    btn.onclick = () => handleAnswer(btn, opt, q);
    choicesDiv.appendChild(btn);
  });
}

function handleAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === correct.ja) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  if (selected.ja === correct.ja) {
    score++; btn.classList.add('correct');
    fb.innerHTML = '<div class="msg ok">正解！</div>';
  } else {
    wrongCount++; btn.classList.add('incorrect');
    wrongWords.push(correct.en);
    fb.innerHTML = `<div class="msg ng">不正解…</div><div class="answer-info">正解: ${correct.ja}</div>`;
  }
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('wrongNum').textContent = wrongCount;
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= quizWords.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('progressBar').style.width = '100%';
  wrongWords.forEach(w => { if (!reviewBank.includes(w)) reviewBank.push(w); });
  quizWords.forEach(q => {
    if (!wrongWords.includes(q.en) && reviewBank.includes(q.en)) {
      reviewBank = reviewBank.filter(w => w !== q.en);
    }
  });
  saveReviewWords(reviewBank);

  const total = quizWords.length;
  const pct = Math.round((score / total) * 100);
  let emoji = '';
  if (pct === 100) emoji = '🎉 パーフェクト！';
  else if (pct >= 80) emoji = '👏 すばらしい！';
  else if (pct >= 60) emoji = '💪 いい調子！';
  else emoji = '📖 もう少しがんばろう！';

  let html = `
    <h2>結果発表</h2>
    <div class="big-score">${score}<span> / ${total}</span></div>
    <p style="font-size:1.3rem; margin-bottom:8px;">${emoji}</p>
    <div class="detail">正答率: ${pct}%<br>復習リスト: ${reviewBank.length}語</div>
  `;
  if (wrongWords.length > 0) {
    html += `<div style="text-align:left; background:#1e293b; border-radius:12px; padding:16px; margin-bottom:20px; border:1px solid #334155; max-height:300px; overflow-y:auto;">
      <div style="font-size:0.8rem; color:#f87171; font-weight:600; margin-bottom:8px;">間違えた単語:</div>`;
    wrongWords.forEach(en => {
      const w = ALL_WORDS.find(x => x.en === en);
      html += `<div style="padding:6px 0; border-bottom:1px solid #334155; font-size:0.9rem;">
        <strong style="color:#f8fafc;">${w.en}</strong> <span style="color:#94a3b8;">= ${w.ja}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">`;
  html += `<button class="action-btn primary" onclick="goHome()">ホームに戻る</button>`;
  if (reviewBank.length > 0) {
    html += `<button class="action-btn review" onclick="startReviewMode()">復習する (${reviewBank.length}語)</button>`;
  }
  html += `</div>`;

  const resultDiv = document.getElementById('resultScreen');
  resultDiv.innerHTML = html;
  resultDiv.classList.remove('hidden');
}

function goHome() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  updateReviewPanel();
  switchTab('all');
}

updateReviewPanel();
